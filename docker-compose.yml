services:
  nids-early-exit:
    build: ./traffic_agent
    container_name: nids_early_exit_agent
    restart: always
    network_mode: "host"
    cap_add:
      - NET_ADMIN  # Permite que o YAF coloque a interface em modo promíscuo
    environment:
      - INTERFACE=wlp2s0  # Altere aqui para a interface real da sua máquina (ex: wlan0, enp3s0)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"